<!DOCTYPE html>
<html>
<head>
    <title>Surprise!</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .tap {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <!-- POPUP -->
    <div class="overlay" id="popup" onclick="startMusic()">
        <div class="tap">click anywhere to start music!❤️ </div>

        <span class="close" onclick="closePopup(event)">&times;</span>

        <img id="slide" src="https://i.imgur.com/2h4ZSUn.jpeg">
    </div>

    <!-- 🎵 MUSIC -->
    <audio id="music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const images = [
            "https://i.imgur.com/2h4ZSUn.jpeg",
            "https://i.imgur.com/FZqTTFs.jpeg?2",
            "https://i.imgur.com/ahXa0CV.jpeg",
            "https://i.imgur.com/VMQxABO.jpeg",
            "https://i.imgur.com/3UNZsQM.jpeg",
            "https://i.imgur.com/89Tf01j.jpeg",
        ];

        let current = 0;

        function nextImage() {
            current = (current + 1) % images.length;
            document.getElementById("slide").src = images[current];
        }

        // slideshow every 3 sec
        setInterval(nextImage, 3000);

        // 🎵 MUSIC CONTROL
        let started = false;

        function startMusic() {
            if (started) return;
            started = true;

            const music = document.getElementById("music");

            music.muted = false;
            music.volume = 1;

            music.play()
                .then(() => console.log("Playing 🎵"))
                .catch(() => {
                    // retry for strict mobile browsers
                    document.body.addEventListener("click", () => {
                        music.play();
                    }, { once: true });
                });

            document.querySelector(".tap").style.display = "none";
        }

        function closePopup(event) {
            event.stopPropagation();
            document.getElementById("popup").style.display = "none";
            document.getElementById("music").pause();
        }
    </script>

</body>
</html>
