<!DOCTYPE html>
<html>
<head>
    <title>Surprise!</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .tap {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="overlay" id="popup" onclick="startMusic()">
        <div class="tap">Tap anywhere 💖</div>

        <span class="close" onclick="closePopup(event)">&times;</span>

        <img id="slide" src="https://i.imgur.com/2h4ZSUn.jpeg">
    </div>

    <!-- 🎵 MUSIC -->
    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const images = [
            "https://i.imgur.com/2h4ZSUn.jpeg",
            "https://i.imgur.com/89Tf01j.jpeg"
        ];

        let current = 0;

        function nextImage() {
            current = (current + 1) % images.length;
            document.getElementById("slide").src = images[current];
        }

        setInterval(nextImage, 3000);

        // 🎵 START MUSIC (MOBILE SAFE)
        let started = false;

        function startMusic() {
            if (started) return;
            started = true;

            const music = document.getElementById("music");

            music.play().then(() => {
                console.log("Music playing 🎵");
            }).catch(() => {
                console.log("Tap again if needed");
            });

            // hide tap text
            document.querySelector(".tap").style.display = "none";
        }

        function closePopup(event) {
            event.stopPropagation();
            document.getElementById("popup").style.display = "none";
            document.getElementById("music").pause();
        }
    </script>

</body>
</html>
